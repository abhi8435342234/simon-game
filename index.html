<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simon game</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="heading">
        <h1 class="name">simon game</h1>
        <p class="para">press any key to start  the game</p>

        <button class="d green" id="green">3</button>   
        <button class="e yellow" id="yellow">4</button>
    </div>
    <script src="app.js"></script>


    
</body>
